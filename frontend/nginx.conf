server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (USANDO URL PÚBLICA)
    location /api/ {
        proxy_pass https://backend-production-2847.up.railway.app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host backend-production-2847.up.railway.app;
        proxy_cache_bypass $http_upgrade;

        # 🌟 FIX: Activar SNI para que el handshake SSL no falle en Railway
        proxy_ssl_server_name on;
        proxy_ssl_name backend-production-2847.up.railway.app;
        
        # Aumentar timeouts para evitar 504 en peticiones lentas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }


    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
